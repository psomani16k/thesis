# ========== Window ==========
background_opacity 1
# background_blur is available only if Kitty was built with that feature.
# If you get errors, just comment this out.
background_blur 0

window_padding_width 0
window_margin_width 0
window_border_width 0

# Decorations
# Options: none, full, or titlebar-only
window_decorations none

# Startup mode
startup_session none
startup_fullscreen yes


# ========== Font ==========
font_family      CaskaydiaCove Nerd Font Mono
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        10.0


# ========== Cursor ==========
cursor_shape beam
cursor_beam_thickness 0.1
cursor_blink_interval -1 


# ========== Keybindings ==========
map ctrl+alt+f toggle_fullscreen
map ctrl+alt+c copy_to_clipboard
map ctrl+alt+v paste_from_clipboard


# ========== Shell ==========
shell /bin/fish

# black background
# background #000000

input_delay 0
sync_to_monitor yes
wayland_enable_ime no

include dank-theme.conf
